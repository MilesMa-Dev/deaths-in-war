    <noscript>
      <h1>Deaths in War — Ongoing Armed Conflicts Tracker</h1>
      <p>An interactive 3D visualization tracking ongoing armed conflicts worldwide and their human cost. Data sourced from Wikipedia's list of ongoing armed conflicts, updated daily.</p>
      <p>This site displays a 3D globe showing the locations, death tolls, and intensity levels of all currently active armed conflicts around the world. Conflicts are classified into four intensity levels: Major Wars (10,000+ deaths/year), Wars (1,000–9,999 deaths/year), Minor Conflicts (100–999 deaths/year), and Skirmishes (under 100 deaths/year).</p>
      <p>The data is automatically scraped daily and includes conflict name, location, countries involved, start year, estimated death toll, and geographic coordinates.</p>
      <p>Access the raw data via our API: <a href="https://deaths-in-war.vercel.app/api/conflicts">JSON API</a></p>
      <p>Learn more at <a href="https://en.wikipedia.org/wiki/List_of_ongoing_armed_conflicts">Wikipedia's List of Ongoing Armed Conflicts</a>.</p>
    </noscript>
